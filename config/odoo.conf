[options]
; Odoo Configuration File

; Database configuration
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = odoo

; Server configuration
http_port = 8069
longpolling_port = 8072
workers = 4
max_cron_threads = 2

; Custom Addons Path
addons_path = /usr/lib/python3/dist-packages/odoo/addons

; Security
admin_passwd = admin
csv_internal_separator = ','

; Email Configuration (optional)
; smtp_server = localhost
; smtp_port = 25
; smtp_user = False
; smtp_password = False
; smtp_encryption = none

; Logging
log_level = info
logfile = False

; Limits
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 60
limit_time_real = 120
